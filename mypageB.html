<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap');
        body {
            background-color: #4a00a0;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Kanit', sans-serif;
        }
        .profile-container {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 900px;
            animation: slideIn 0.8s;
        }
        .info { text-align: left; }
        h1 { font-size: 2.8rem; margin-bottom: 20px; }
        p { font-size: 1.2rem; margin-bottom: 10px; color: #e0ccff; }
        strong { color: white; margin-right: 10px; }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #c29dff;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-btn:hover { color: white; transform: translateX(-5px); }
        .profile-img {
            width: 300px; height: 300px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 0 50px rgba(180, 100, 255, 0.6);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="info">
            <h1>เวฟ เท็นนีย์สัน</h1>
            <p><strong>อายุ:</strong> 21 ปี</p>
            <p><strong>กำลังศึกษา:</strong> มหาวิทยาลัยเอเชียอาคเนย์ (SAU)</p>
            <p><strong>สาขา:</strong> ดิจิทัลเทคโนโลยีและนวัตกรรม (DTI)</p>
            <p><strong>งานอดิเรก:</strong> เล่นเกม ฟังเพลง ดูหนัง</p>
            <a href="index.html" class="back-btn">&larr; กลับหน้าแรก</a>
        </div>
        <img src="images/651248002_929632673006095_5524241324059816600_n.jpg" alt="Profile" class="profile-img">
    </div>
</body>
</html>
