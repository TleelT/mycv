<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Someone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;600&display=swap');
        body {
            background-color: #4a00a0;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Kanit', sans-serif;
        }
        .container { text-align: center; animation: fadeIn 0.8s; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { color: #d1b3ff; margin-bottom: 50px; }
        .button-group { display: flex; gap: 25px; justify-content: center; }
        .btn {
            text-decoration: none;
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 20px 60px;
            border-radius: 20px;
            font-size: 1.5rem;
            font-weight: 500;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 0 25px rgba(180, 100, 255, 0.5);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Choose to Check Someone</h1>
        <p>Select a profile to view detail</p>
        <div class="button-group">
            <a href="mypageA.html" class="btn">Tle</a>
            <a href="mypageB.html" class="btn">Wave</a>
        </div>
    </div>
</body>
</html>
