<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>อ่านเป็นเก</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@900&display=swap');
        body {
            background: #000; color: #fff; font-family: 'Prompt', sans-serif;
            overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        h1 { font-size: 5rem; text-transform: uppercase; margin: 0; background: linear-gradient(90deg, #ff00ff, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shake 0.5s infinite; }
        .btn-group { display: flex; gap: 50px; margin-top: 50px; }
        .super-btn {
            padding: 30px 60px; font-size: 2rem; font-weight: 900; border: none; border-radius: 50px; cursor: pointer; transition: 0.2s; text-decoration: none; color: #000; box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }
        .btn-a { background: #00ff00; } .btn-b { background: #ff0055; color: white; }
        .super-btn:hover { transform: scale(1.2) rotate(5deg); filter: brightness(1.5); box-shadow: 0 0 100px #fff; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(1px, 1px) rotate(0deg); } }
    </style>
</head>
<body>
    <p>🥵ระวัง! คุณกำลังเข้าสู่เขตของ🥵</p>
    <h1>💦เติ้ลหนุ่มโรมัน💦</h1>
    <div class="btn-group">
        <a href="mypageA.html" class="super-btn btn-a">กดอันนี้ถ้าอยากตาค้าง</a>
        <a href="mypageB.html" class="super-btn btn-b">กดอันนี้ถ้าอยากใจสั่น</a>
    </div>
</body>
</html>
