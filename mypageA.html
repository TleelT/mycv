<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>อ่านไมไอเก</title>
    <style>
        body {
            margin: 0; height: 100vh; font-family: 'Prompt', sans-serif;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradient 5s ease infinite;
            display: flex; flex-direction: column; align-items: center; justify-content: center; color: white;
        }
        .hero-img {
            width: 300px; height: 300px; border-radius: 50%; border: 15px solid rgba(255,255,255,0.3);
            object-fit: cover; animation: bounce 2s infinite;
        }
        .info-box { background: rgba(0,0,0,0.7); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid #fff; }
        .badge { background: gold; color: black; padding: 5px 20px; border-radius: 50px; font-weight: bold; font-size: 1.2rem; }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    </style>
</head>
<body>
    <img src="images/650107363_1267297115338844_7502777813777019134_n.jpg" class="hero-img">
    <div class="info-box">
        <span class="badge">#ความหล่อเป็นเหตุ</span>
        <h1>Chonlasit Tunpiriyakul</h1>
        <p>ตำแหน่ง: "ผู้เขียนโค้ดที่พระเจ้ายังต้องเหลียวมอง"</p>
        <p>สกิล: เขียน HTML เทพ, CSS หล่อ, JavaScript ขิงๆ</p>
        <a href="index.html" style="color: cyan; text-decoration: none;">[ ยอมแพ้แล้ว กดกลับหน้าหลัก ]</a>
    </div>
</body>
</html>
